    - data:
        code: "import json\nimport os\nfrom urllib.error import HTTPError, URLError\n\
          from urllib.parse import urlencode\nfrom urllib.request import Request,\
          \ urlopen\n\n\ndef _norm(text):\n    return str(text or '').strip()\n\n\n\
          def _run_json_get(url, headers, timeout=30):\n    req = Request(url=url,\
          \ headers=headers, method='GET')\n    try:\n        with urlopen(req, timeout=timeout)\
          \ as resp:\n            body = resp.read().decode('utf-8', errors='replace')\n\
          \            status = resp.getcode()\n    except HTTPError as exc:\n   \
          \     body = exc.read().decode('utf-8', errors='replace')\n        return\
          \ {}, f'HTTPError {exc.code}: {body}'\n    except URLError as exc:\n   \
          \     return {}, f'URLError: {exc}'\n    except Exception as exc:\n    \
          \    return {}, f'Error: {exc}'\n    if status != 200:\n        return {},\
          \ f'HTTP {status}: {body}'\n    try:\n        return json.loads(body), None\n\
          \    except Exception:\n        return {}, f'Invalid JSON: {body[:400]}'\n\
          \n\ndef _fetch_all_segments(api_base, dataset_id, doc_id, headers):\n  \
          \  all_segs = []\n    seen = set()\n    for page in range(1, 31):\n    \
          \    q = urlencode({'page': page, 'limit': 100})\n        url = f'{api_base}/datasets/{dataset_id}/documents/{doc_id}/segments?{q}'\n\
          \        payload, err = _run_json_get(url, headers=headers, timeout=30)\n\
          \        if err:\n            if page == 1:\n                return '',\
          \ f'segments error: {err}'\n            break\n        items = payload.get('data')\
          \ or payload.get('segments') or []\n        if not items:\n            break\n\
          \        for seg in items:\n            for key in ('content', 'text'):\n\
          \                val = seg.get(key)\n                if isinstance(val,\
          \ str) and val.strip():\n                    sid = _norm(seg.get('id'))\
          \ or val[:100]\n                    if sid not in seen:\n              \
          \          seen.add(sid)\n                        pos = seg.get('position',\
          \ 10 ** 9)\n                        all_segs.append((pos, val.strip()))\n\
          \                    break\n        if len(items) < 100:\n            break\n\
          \    if not all_segs:\n        return '', 'no segments found'\n    all_segs.sort(key=lambda\
          \ x: x[0])\n    return '\\n\\n'.join(t for _, t in all_segs), None\n\n\n\
          def _find_doc_id_by_title(api_base, dataset_id, title, headers):\n    #\
          \ Find document ID by matching title against doc_metadata from the list\
          \ response.\n    # Uses the list endpoint doc_metadata field directly -\
          \ no per-document detail calls.\n    expected = title.lower().strip()\n\
          \    exp_words = set(expected.split())\n    for page in range(1, 21):\n\
          \        q = urlencode({'page': page, 'limit': 100})\n        url = f'{api_base}/datasets/{dataset_id}/documents?{q}'\n\
          \        payload, err = _run_json_get(url, headers=headers, timeout=30)\n\
          \        if err:\n            break\n        items = payload.get('data')\
          \ or []\n        if not items:\n            break\n        for item in items:\n\
          \            doc_id = _norm(item.get('id'))\n            if not doc_id:\n\
          \                continue\n            # Read title from doc_metadata (already\
          \ in list response, no extra call)\n            doc_title = ''\n       \
          \     for m in (item.get('doc_metadata') or []):\n                if _norm((m\
          \ or {}).get('name')).lower() == 'title':\n                    doc_title\
          \ = _norm((m or {}).get('value'))\n                    break\n         \
          \   if not doc_title:\n                doc_title = _norm(item.get('name',\
          \ ''))\n            if not doc_title:\n                continue\n      \
          \      if doc_title.lower() == expected:\n                return doc_id,\
          \ None\n            if exp_words:\n                doc_words = set(doc_title.lower().split())\n\
          \                if len(exp_words & doc_words) / len(exp_words) >= 0.8:\n\
          \                    return doc_id, None\n        if len(items) < 100:\n\
          \            break\n    return '', f'no document found for title: {title!r}'\n\
          \n\ndef main(doc_id=None, item_title=None, item_authors=None, item_year=None,\
          \ item_journal=None, paper_count=None):\n    api_base = (\n        _norm(os.getenv('DIFY_API_URL'))\
          \ or 'http://rmap-chatbot-demo-dify/v1'\n    ).rstrip('/')\n    dataset_id\
          \ = (\n        _norm(os.getenv('DIFY_DATASET_ID')) or '<your-dataset-id>'\n\
          \    )\n    api_key = (\n        _norm(os.getenv('DIFY_API_KEY')) or 'REDACTED'\n\
          \    )\n    headers = {'Authorization': f'Bearer {api_key}', 'Content-Type':\
          \ 'application/json'}\n\n    resolved = _norm(doc_id)\n    if not resolved:\n\
          \        title = _norm(item_title)\n        if not title:\n            return\
          \ {'paper_context': '', 'paper_fetch_error': 'no doc_id and no title'}\n\
          \        resolved, err = _find_doc_id_by_title(api_base, dataset_id, title,\
          \ headers)\n        if not resolved:\n            return {'paper_context':\
          \ '', 'paper_fetch_error': err or 'title lookup failed'}\n\n    text, err\
          \ = _fetch_all_segments(api_base, dataset_id, resolved, headers)\n    if\
          \ err:\n        return {'paper_context': '', 'paper_fetch_error': err}\n\
          \n    title  = _norm(item_title)\n    year   = _norm(item_year)\n    journal\
          \ = _norm(item_journal)\n    authors = _norm(item_authors)\n    meta_line\
          \ = f'{title} ({year}, {journal}) — {authors}' if (year or journal or authors)\
          \ else title\n    header = f'=== {meta_line} ==='\n    n = int(paper_count)\
          \ if paper_count and int(paper_count) > 0 else 1\n    chars_per_paper =\
          \ max(4000, 48000 // n)\n    context = f'{header}\\n\\n{text[:chars_per_paper]}'\n\
          \    return {'paper_context': context, 'paper_fetch_error': ''}\n"
