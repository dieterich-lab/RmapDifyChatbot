    - data:
        code: "def _is_summary_intent(query):\n    q = (query or '').lower()\n    markers = [\n        'summarize', 'summary', 'zusammenfassung', 'fasse', 'fassen',\n        'overview', 'explain briefly', 'kurz', 'short summary'\n    ]\n    return any(m in q for m in markers)\n\n\ndef _coverage_score(result):\n    if not isinstance(result, list):\n        return {'sections': 0, 'junk': 0, 'count': 0}\n\n    section_terms = ['abstract', 'introduction', 'method', 'result', 'discussion', 'conclusion']\n    junk_terms = ['references', 'license', 'downloaded from', 'email alerting', 'supplemental', 'copyright']\n\n    section_hits = 0\n    junk_hits = 0\n    examined = 0\n\n    for item in result[:6]:\n        text = str((item or {}).get('content') or '').lower()\n        if not text:\n            continue\n        examined += 1\n        if any(t in text for t in section_terms):\n            section_hits += 1\n        if any(t in text for t in junk_terms):\n            junk_hits += 1\n\n    return {'sections': section_hits, 'junk': junk_hits, 'count': examined}\n\n\ndef main(primary_result=None, fallback_result=None, user_query=None):\n    primary = primary_result if isinstance(primary_result, list) else []\n    fallback = fallback_result if isinstance(fallback_result, list) else []\n\n    summary = _is_summary_intent(user_query or '')\n    p = _coverage_score(primary)\n    f = _coverage_score(fallback)\n\n    use_fallback = False\n    reason = 'primary-ok'\n\n    if summary:\n        primary_good = p['sections'] >= 2 and p['junk'] <= max(1, p['count'] // 2)\n        fallback_good = f['sections'] >= p['sections'] or (f['sections'] >= 2 and f['junk'] <= p['junk'])\n\n        if (not primary_good) and fallback and fallback_good:\n            use_fallback = True\n            reason = 'fallback-better-coverage'\n        elif (not primary_good) and fallback and not primary:\n            use_fallback = True\n            reason = 'primary-empty'\n\n    selected = fallback if use_fallback else primary\n    if not selected:\n        selected = primary or fallback\n\n    return {\n        'selected_result': selected,\n        'selection_reason': reason,\n        'primary_sections': p['sections'],\n        'fallback_sections': f['sections']\n    }\n"
