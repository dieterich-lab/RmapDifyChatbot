          \   = _norm(item_year)\n    journal = _norm(item_journal)\n    authors =\
          \ _norm(item_authors)\n    meta_line = f'{title} ({year}, {journal}) — {authors}'\
          \ if (year or journal or authors) else title\n    header = f'=== {meta_line}\
          \ ==='\n    n = int(paper_count) if paper_count and int(paper_count) > 0\
          \ else 1\n    chars_per_paper = max(4000, 48000 // n)\n    context = f'{header}\\\
          n\\n{text[:chars_per_paper]}'\n    return {'paper_context': context, 'paper_fetch_error':\
          \ ''}\n"
