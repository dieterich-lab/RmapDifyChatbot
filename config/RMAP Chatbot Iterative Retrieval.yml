    - data:
        code: "def _normalize_obj(item):\n    if not isinstance(item, dict):\n   \
          \     return None\n    title = str(item.get('title') or '').strip()\n  \
          \  authors = str(item.get('authors') or item.get('author') or '').strip()\n\
          \    year = str(item.get('year') or '').strip()\n    journal = str(item.get('journal')\
          \ or '').strip()\n    if not any([title, authors, year, journal]):\n   \
          \     return None\n    return {\n        'title': title,\n        'authors':\
          \ authors,\n        'year': year,\n        'journal': journal,\n    }\n\n\
          \ndef _parse_from_iteration_output(iteration_output):\n    parsed = []\n\
          \    if not isinstance(iteration_output, list):\n        return parsed\n\
          \n    for block in iteration_output:\n        if not isinstance(block, str):\n\
          \            continue\n        for line in block.splitlines():\n       \
          \     line = line.strip()\n            if not line:\n                continue\n\
          \            if '|' not in line:\n                continue\n           \
          \ if '. ' in line:\n                _, _, line = line.partition('. ')\n\
          \            parts = [p.strip() for p in line.split('|')]\n            if\
          \ len(parts) != 4:\n                continue\n            obj = _normalize_obj(\n\
          \                {\n                    'title': parts[0],\n           \
          \         'authors': parts[1],\n                    'year': parts[2],\n\
          \                    'journal': parts[3],\n                }\n         \
          \   )\n            if obj is not None:\n                parsed.append(obj)\n\
          \    return parsed\n\n\ndef _dedupe(items):\n    unique = {}\n    for item\
          \ in items:\n        obj = _normalize_obj(item)\n        if obj is None:\n\
          \            continue\n        key = (\n            obj['title'].lower(),\n\
          \            obj['authors'].lower(),\n            obj['year'],\n       \
          \     obj['journal'].lower(),\n        )\n        if key not in unique:\n\
          \            unique[key] = obj\n    return list(unique.values())\n\n\ndef\
          \ main(iteration_output=None, memory=None):\n    parsed_docs = _dedupe(_parse_from_iteration_output(iteration_output))\n\
          \    if parsed_docs:\n        return {'memory': parsed_docs}\n\n    existing\
          \ = memory if isinstance(memory, list) else []\n    return {'memory': _dedupe(existing)}\n"
