          \ isinstance(block, str):\n            continue\n        for line in block.splitlines():\n\
          \            line = line.strip()\n            if not line:\n           \
          \     continue\n            if \"|\" not in line:\n                continue\n\
          \            # Strip leading numbering like \"1. \"\n            if \".\
          \ \" in line:\n                _, _, line = line.partition(\". \")\n   \
          \         parts = [p.strip() for p in line.split(\"|\")]\n            #\
          \ Accept 3-5 parts: title | [authors] | year | journal | [doc_id]\n    \
          \        if len(parts) < 3 or len(parts) > 5:\n                continue\n\
          \            obj_dict = {}\n            if len(parts) == 3:\n          \
          \      obj_dict = {\"title\": parts[0], \"year\": parts[1], \"journal\"\
          : parts[2]}\n            elif len(parts) == 4:\n                obj_dict\
          \ = {\n                    \"title\": parts[0],\n                    \"\
          authors\": parts[1],\n                    \"year\": parts[2],\n        \
          \            \"journal\": parts[3],\n                }\n            else:\
          \  # 5 parts\n                obj_dict = {\n                    \"title\"\
          : parts[0],\n                    \"authors\": parts[1],\n              \
          \      \"year\": parts[2],\n                    \"journal\": parts[3],\n\
          \                    \"doc_id\": parts[4],\n                }\n        \
          \    obj = _normalize_obj(obj_dict)\n            if obj is not None:\n \
          \               parsed.append(obj)\n    return parsed\n\n\ndef _dedupe(items):\n\
          \    unique = {}\n    for item in items:\n        obj = _normalize_obj(item)\n\
          \        if obj is None:\n            continue\n        key = (\n      \
          \      obj[\"title\"].lower(),\n            obj[\"authors\"].lower(),\n\
          \            obj[\"year\"],\n            obj[\"journal\"].lower(),\n   \
          \     )\n        if key not in unique:\n            unique[key] = obj\n\
          \    return list(unique.values())\n\n\ndef main(iteration_output=None, memory=None):\n\
          \    parsed_docs = _dedupe(_parse_from_iteration_output(iteration_output))\n\
          \    if parsed_docs:\n        return {\"memory\": parsed_docs}\n\n    #\
          \ If parsing failed, return existing memory (don't overwrite with empty)\n\
          \    existing = memory if isinstance(memory, list) else []\n    if existing:\n\
          \        return {\"memory\": _dedupe(existing)}\n\n    # Last resort: return\
          \ empty\n    return {\"memory\": []}\n"
