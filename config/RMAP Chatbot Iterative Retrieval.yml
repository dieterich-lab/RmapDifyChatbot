    - data:
        code: "import json, re\n\ndef _clean_paper(item):\n    if not isinstance(item, dict):\n        return None\n    obj = {\n        'title': str(item.get('title') or '').strip(),\n        'authors':\
          \ str(item.get('authors') or item.get('author') or '').strip(),\n        'year': str(item.get('year') or '').strip(),\n        'journal': str(item.get('journal') or '').strip(),\n    }\n    doc_id\
          \ = str(item.get('doc_id') or '').strip()\n    if doc_id:\n        obj['doc_id'] = doc_id\n    return obj if any(obj.values()) else None\n\ndef main(router_text=None, conversation_memory=None):\n\
          \    text = str(router_text or '').strip()\n    # Strip <think> tags\n    text = re.sub(r'<think>.*?</think>', '', text, flags=re.DOTALL).strip()\n    # Strip markdown fences\n    text = re.sub(r'^```(?:json)?\\\
          s*', '', text)\n    text = re.sub(r'\\s*```$', '', text).strip()\n    # Find JSON object\n    m = re.search(r'\\{.*\\}', text, re.DOTALL)\n    if not m:\n        return {'intent': 'knowledge_retrieval',\
          \ 'paper_list': [], 'rewritten_query': ''}\n    try:\n        obj = json.loads(m.group())\n    except Exception:\n        return {'intent': 'knowledge_retrieval', 'paper_list': [], 'rewritten_query':\
          \ ''}\n\n    intent = str(obj.get('intent', '')).strip()\n    if intent not in ('metadata_list', 'content_summary', 'knowledge_retrieval'):\n        intent = 'knowledge_retrieval'\n\n    paper_list\
          \ = obj.get('paper_list')\n    \n    # If paper_list is the string \"use_memory\", populate from conversation.memory\n    if paper_list == 'use_memory':\n        mem = conversation_memory if isinstance(conversation_memory,\
          \ list) else []\n        paper_list = []\n        for item in mem:\n            cleaned = _clean_paper(item)\n            if cleaned:\n                paper_list.append(cleaned)\n    elif not\
          \ isinstance(paper_list, list):\n        paper_list = []\n    else:\n        # Clean paper_list items from LLM output\n        cleaned_list = []\n        for item in paper_list:\n            if\
          \ isinstance(item, dict):\n                c = _clean_paper(item)\n                if c:\n                    cleaned_list.append(c)\n        paper_list = cleaned_list\n\n    rw = str(obj.get('rewritten_query')\
          \ or '').strip()\n    return {'intent': intent, 'paper_list': paper_list, 'rewritten_query': rw}\n"
