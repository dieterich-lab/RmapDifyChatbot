          ^(19|20)[0-9]{2}$\", year_value) else \"\",\n        \"journal\": _to_text(item.get(\"\
          journal\")),\n    }\n\n\ndef _parse_json(extractor_text):\n    if isinstance(extractor_text,\
          \ (dict, list)):\n        return extractor_text\n    if not isinstance(extractor_text,\
          \ str):\n        return {}\n    text = extractor_text.strip()\n    if not\
          \ text:\n        return {}\n    text = re.sub(r\"<think>.*?</think>\", \"\
          \", text, flags=re.DOTALL).strip()\n    if text.startswith(\"```\"):\n \
          \       text = re.sub(r\"^```(?:json)?\\s*\", \"\", text)\n        text\
          \ = re.sub(r\"\\s*```$\", \"\", text).strip()\n    try:\n        parsed\
