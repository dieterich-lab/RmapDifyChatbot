          \    }\n\n\ndef _parse_pipe_line(line):\n    line = line.strip()\n    if not line or '|' not in line:\n        return None\n    # Strip leading numbering like \"1. \"\n    if '. ' in line:\n \
          \       _, _, line = line.partition('. ')\n    parts = [p.strip() for p in line.split('|')]\n    if len(parts) not in (4, 5):\n        return None\n    obj_dict = {\n        'title': parts[0],\n\
          \        'authors': parts[1],\n        'year': parts[2],\n        'journal': parts[3],\n    }\n    if len(parts) == 5:\n        obj_dict['doc_id'] = parts[4]\n    return _normalize_obj(obj_dict)\n\
          \n\ndef _parse_from_iteration_output(iteration_output):\n    parsed = []\n    if not isinstance(iteration_output, list):\n        return parsed\n\n    for block in iteration_output:\n        #\
          \ block can be a string OR a list of strings (when iterator outputs array[string])\n        lines = []\n        if isinstance(block, str):\n            lines = block.splitlines()\n        elif\
          \ isinstance(block, list):\n            for item in block:\n                if isinstance(item, str):\n                    lines.extend(item.splitlines())\n\n        for line in lines:\n     \
          \       obj = _parse_pipe_line(line)\n            if obj is not None:\n                parsed.append(obj)\n\n    return parsed\n\n\ndef _dedupe(items):\n    unique = {}\n    for item in items:\n\
          \        obj = _normalize_obj(item)\n        if obj is None:\n            continue\n        key = (\n            obj['title'].lower(),\n            obj['authors'].lower(),\n            obj['year'],\n\
          \            obj['journal'].lower(),\n        )\n        if key not in unique:\n            unique[key] = obj\n    return list(unique.values())\n\n\ndef main(iteration_output=None, memory=None):\n\
          \    parsed_docs = _dedupe(_parse_from_iteration_output(iteration_output))\n    if parsed_docs:\n        return {'memory': parsed_docs}\n\n    existing = memory if isinstance(memory, list) else\
          \ []\n    return {'memory': _dedupe(existing)}\n"
