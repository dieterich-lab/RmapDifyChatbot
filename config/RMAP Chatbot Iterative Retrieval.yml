    - data:
        code: "import json\nimport os\nimport re\nfrom urllib.error import HTTPError,\
          \ URLError\nfrom urllib.parse import urlencode\nfrom urllib.request import\
          \ Request, urlopen\n\nCODE_VERSION = \"metadata_query_v2026-07-15_broad-query-fix\"\
          \n\n_EMPTY_TOKENS = {\n    \"\",\n    \"null\",\n    \"none\",\n    \"unknown\"\
          ,\n    \"n/a\",\n    \"na\",\n    \"[]\",\n    \"{}\",\n    \"-\",\n}\n\n\
          \ndef _is_set(value) -> bool:\n    if value is None:\n        return False\n\
          \    if isinstance(value, (int, float)) and value == 0:\n        return\
          \ False\n    if isinstance(value, list):\n        return any(_is_set(item)\
          \ for item in value)\n    if isinstance(value, dict):\n        return any(_is_set(v)\
          \ for v in value.values())\n    text = str(value).strip()\n    return text.lower()\
          \ not in _EMPTY_TOKENS\n\n\ndef _normalize_text(value) -> str:\n    if value\
          \ is None:\n        return \"\"\n    text = str(value).strip()\n    return\
          \ \"\" if text.lower() in _EMPTY_TOKENS else text\n\n\ndef _to_string_list(value)\
          \ -> list[str]:\n    if value is None:\n        return []\n    if isinstance(value,\
          \ list):\n        return [_normalize_text(v) for v in value if _is_set(v)]\n\
          \    if isinstance(value, dict):\n        candidates = []\n        for key\
          \ in (\"value\", \"name\", \"author\", \"authors\", \"text\"):\n       \
          \     if key in value:\n                entry = value.get(key)\n       \
          \         if isinstance(entry, list):\n                    candidates.extend(_to_string_list(entry))\n\
          \                elif _is_set(entry):\n                    norm = _normalize_text(entry)\n\
          \                    if norm:\n                        candidates.append(norm)\n\
          \        if candidates:\n            return candidates\n        return [_normalize_text(v)\
          \ for v in value.values() if _is_set(v)]\n    if _is_set(value):\n     \
          \   normalized = _normalize_text(value)\n        return [normalized] if\
          \ normalized else []\n    return []\n\n\ndef _author_variants(author: str)\
          \ -> list[str]:\n    text = \" \".join(str(author).strip().split())\n  \
          \  if not text:\n        return []\n\n    variants = [text]\n\n    # Normalize\
          \ \"Last, First\" → \"First Last\"\n    if \",\" in text:\n        comma_parts\
          \ = [p.strip() for p in text.split(\",\", 1)]\n        if len(comma_parts)\
          \ == 2 and comma_parts[0] and comma_parts[1]:\n            variants.append(f\"\
          {comma_parts[1]} {comma_parts[0]}\")\n\n    parts = text.split(\" \")\n\
          \    if len(parts) >= 2:\n        first = parts[0].strip(\".,;\")\n    \
          \    last = parts[-1].strip(\".,;\")\n        if first and last:\n     \
          \       variants.append(f\"{first[0]}. {last}\")\n            variants.append(f\"\
          {first[0]} {last}\")\n            variants.append(last)\n\n    # Always\
          \ add just the last word as a variant (handles \"Dieterich\", \"Helm\" etc.)\n\
          \    if parts:\n        last_word = parts[-1].strip(\".,;\")\n        if\
          \ last_word and last_word.lower() not in {v.lower() for v in variants}:\n\
          \            variants.append(last_word)\n\n    seen = set()\n    deduped\
          \ = []\n    for item in variants:\n        key = item.lower()\n        if\
