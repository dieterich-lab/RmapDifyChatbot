    - data:
        code: "import re\n\n\ndef _strip_think(text):\n    cleaned = str(text or \"\
          \")\n    cleaned = re.sub(r\"<think>.*?</think>\", \"\", cleaned, flags=re.S\
          \ | re.I)\n    cleaned = re.sub(r\"<think>.*$\", \"\", cleaned, flags=re.S\
          \ | re.I)\n    return cleaned.strip()\n\n\ndef main(**kwargs):\n    parts\
          \ = []\n    for key in (\n        \"extraction_text\",\n        \"entity_text\"\
          ,\n        \"summary_text\",\n        \"knowledge_text\",\n        \"metadata_text\"\
          ,\n    ):\n        text = kwargs.get(key)\n        if text:\n          \
          \  cleaned = _strip_think(text)\n            if cleaned:\n             \
          \   parts.append(cleaned)\n\n    # Fallback: use result_text from Metadata\
          \ Query only if no meaningful LLM output\n    rt = kwargs.get(\"result_text\"\
          )\n    if rt:\n        cleaned = _strip_think(rt)\n        is_meaningful\
          \ = (\n            cleaned\n            and len(cleaned) > 50\n        \
          \    and \"Insufficient context\" not in cleaned\n            and \"Keine\
          \ Dokumente gefunden\" not in cleaned\n        )\n        # Check if all\
          \ LLM outputs are weak (empty, short, or negative)\n        _WEAK_MARKERS\
          \ = [\n            \"Insufficient\",\n            \"Keine Dokumente\",\n\
          \            \"cannot determine\",\n            \"cannot answer\",\n   \
          \         \"no relevant\",\n            \"does not contain\",\n        \
          \    \"does not provide\",\n            \"not found\",\n            \"not\
          \ available\",\n            \"unable to\",\n            \"I could not\"\
          ,\n            \"I cannot\",\n        ]\n\n        def _is_weak(text):\n\
          \            t = text.strip()\n            if len(t) < 40:\n           \
          \     return True\n            t_lower = t.lower()\n            return any(m.lower()\
          \ in t_lower for m in _WEAK_MARKERS)\n\n        # If no LLM parts OR all\
          \ LLM parts are weak, use result_text\n        if is_meaningful and (not\
          \ parts or all(_is_weak(p) for p in parts)):\n            parts = [cleaned]\
          \  # Replace, don't append\n        elif not parts and cleaned:\n      \
          \      parts.append(cleaned)\n    merged = \"\\n\\n\".join(parts).strip()\n\
          \    if not merged:\n        merged = (\n            \"I could not generate\
          \ a meaningful answer for your query. \"\n            \"This may be because\
          \ the search was too broad or did not match any documents.\\n\\n\"\n   \
          \         \"Suggestions:\\n\"\n            \"- For paper listings: try 'Papers\
          \ by <author name>' or 'Papers from <year>'\\n\"\n            \"- For topic\
          \ searches: try 'What is m6A?' or 'Which methods detect RNA modifications?'\\\
          n\"\n            \"- For author lookups: try 'Who has worked on tRNA modifications?'\\\
          n\"\n            \"- For entity lookups: try 'Which RNA modifications are\
          \ most studied?'\"\n        )\n    return {\"cleaned_text\": merged}\n"
