            3. Copy author names EXACTLY from the header — no initials expansion.
            CRITICAL: Each paper entry gets its authors ONLY from its OWN header.
            Do NOT copy authors from one header into another paper entry. If Paper
            A has authors X,Y,Z and Paper B has authors P,Q,R, then Paper A lists
