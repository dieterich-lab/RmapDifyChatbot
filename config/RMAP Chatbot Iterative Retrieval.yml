    - data:
        code: |-
          import json
          import re


          def _to_text(value):
              if value is None:
                  return ''
              if isinstance(value, list):
                  parts = [str(v).strip() for v in value if str(v).strip()]
                  return ', '.join(parts)[:300]
              if isinstance(value, dict):
                  for key in ('value', 'name', 'author', 'authors', 'text'):
                      if key in value:
                          return _to_text(value.get(key))
                  parts = [str(v).strip() for v in value.values() if str(v).strip()]
                  return ', '.join(parts)[:300]
              return str(value).strip()[:300]


          def _clean_obj(item):
              if not isinstance(item, dict):
                  return None
              year_value = _to_text(item.get('year'))
              return {
                  'title': _to_text(item.get('title')),
                  'authors': _to_text(item.get('authors') or item.get('author')),
                  'year': year_value if re.fullmatch(r'^(19|20)[0-9]{2}$', year_value) else '',
                  'journal': _to_text(item.get('journal')),
              }


          def _extract_year(value):
              text = _to_text(value)
              return int(text) if re.fullmatch(r'^(19|20)[0-9]{2}$', text) else -1


          def _parse_json(extractor_text):
              if isinstance(extractor_text, dict):
                  return extractor_text
              if not isinstance(extractor_text, str):
                  return {}
              text = extractor_text.strip()
              if not text:
                  return {}
              if text.startswith('```'):
                  text = re.sub(r'^```(?:json)?\s*', '', text)
                  text = re.sub(r'\s*```$', '', text).strip()
              try:
                  parsed = json.loads(text)
              except Exception:
                  return {}
              return parsed if isinstance(parsed, dict) else {}


          def _clean_list(items):
              cleaned = []
              if not isinstance(items, list):
                  return cleaned
              for item in items:
                  obj = _clean_obj(item)
                  if obj is None:
                      continue
                  if any(obj.values()):
                      cleaned.append(obj)
              return cleaned


          def _looks_like_followup(query):
              text = str(query or '').strip().lower()
              if not text:
                  return False
              patterns = [
                  r'\bthese papers\b',
                  r'\bthose papers\b',
                  r'\bthese results\b',
                  r'\bthose results\b',
                  r'\bthe above\b',
                  r'\bthe listed\b',
                  r'\bprevious(ly)?\b',
                  r'\bthem\b',
                  r'\bone(s)?\b',
                  r'\bsummarize\b',
                  r'\bsummary\b',
                  r'\bcompare\b',
                  r'\bcontrast\b',
                  r'\bdifference(s)?\b',
                  r'\bsimilarit(y|ies)\b',
                  r'\bkey findings\b',
                  r'\bmethods\b',
                  r'\blimitations\b',
                  r'\bnewest\b',
                  r'\boldest\b',
                  r'\bmost recent\b',
                  r'\bwhich (paper|one)\b',
                  r'\bfirst (paper|one|two|three|\d+)\b',
                  r'\btop (\d+)\b',
                  r'\bfasse\b',
                  r'\bzusammenfassen\b',
                  r'\bvergleiche\b',
                  r'\bunterschied(e)?\b',
                  r'\bwelches paper\b',
                  r'\bdiese(n|r)? (papiere|paper|ergebnisse)\b',
                  r'\bdavor\b',
                  r'\bvorherig\w*\b',
              ]
              return any(re.search(p, text) for p in patterns)


          def _extract_limit(query):
              text = str(query or '').strip().lower()
              if not text:
                  return None

              for pattern in (r'\btop\s+(\d{1,2})\b', r'\bfirst\s+(\d{1,2})\b', r'\bersten?\s+(\d{1,2})\b'):
                  m = re.search(pattern, text)
                  if m:
                      value = int(m.group(1))
                      return value if value > 0 else None

              if re.search(r'\bfirst\s+two\b|\bersten?\s+zwei\b', text):
                  return 2
              if re.search(r'\bfirst\s+three\b|\bersten?\s+drei\b', text):
                  return 3
              if re.search(r'\bfirst\s+one\b|\bersten?\s+eins\b', text):
                  return 1
              return None


          def _sort_by_year(items, newest_first=True):
              return sorted(items, key=lambda x: _extract_year(x.get('year')), reverse=newest_first)


          def _apply_followup_subset(memory_items, query):
              text = str(query or '').strip().lower()
              items = list(memory_items)
              if not items:
                  return items

              if re.search(r'\b(newest|latest|most recent|neueste[snrm]?)\b', text):
                  sorted_items = _sort_by_year(items, newest_first=True)
                  if _extract_year(sorted_items[0].get('year')) != -1:
                      return sorted_items[:1]

              if re.search(r'\b(oldest|earliest|aelteste[snrm]?|älteste[snrm]?)\b', text):
                  sorted_items = _sort_by_year(items, newest_first=False)
                  if _extract_year(sorted_items[0].get('year')) != -1:
                      return sorted_items[:1]

              limit = _extract_limit(text)
              if isinstance(limit, int):
                  return items[:limit]

              return items


          def main(extractor_text=None, memory=None, query=None):
              data = _parse_json(extractor_text)

              if isinstance(data.get('paper_list'), list):
                  raw_items = data.get('paper_list')
              elif any(k in data for k in ('title', 'authors', 'author', 'year', 'journal')):
                  raw_items = [data]
              elif isinstance(data.get('authors'), list):
                  raw_items = [{'authors': a} for a in data.get('authors') if str(a).strip()]
              else:
                  raw_items = []

              cleaned = _clean_list(raw_items)
              if cleaned:
                  return {'paper_list': cleaned}

              if _looks_like_followup(query) and isinstance(memory, list):
                  fallback = _clean_list(memory)
                  subset = _apply_followup_subset(fallback, query)
                  return {'paper_list': subset}

              q = str(query or '').strip()
              m = re.search(r'\b(?:by|von)\s+([A-Z][A-Za-z.-]+(?:\s+[A-Z][A-Za-z.-]+){1,4})', q)
              if m:
                  return {'paper_list': [{'title': '', 'authors': m.group(1).strip(' ,.;:'), 'year': '', 'journal': ''}]}

              return {'paper_list': []}

