          \    parsed_docs = _dedupe(_parse_from_iteration_output(iteration_output))\n\
          \    if parsed_docs:\n        return {'memory': parsed_docs}\n\n    existing\
          \ = memory if isinstance(memory, list) else []\n    return {'memory': _dedupe(existing)}\n"
