    - data:
        code: "def _clean(value):\n    if value is None:\n        return \"\"\n    return str(value).strip()\n\n\ndef _is_summary_intent(query):\n    q = (query or '').lower()\n    markers = [\n        'summarize', 'summary', 'zusammenfassung', 'fasse', 'fassen',\n        'overview', 'explain briefly', 'kurz', 'short summary'\n    ]\n    return any(m in q for m in markers)\n\n\ndef _section_tokens():\n    # Keep retrieval terms compact and high-signal for hybrid (keyword+vector) search.\n    return 'abstract methods results conclusions key findings'\n\n\ndef _meta_suffix(authors, year, journal):\n    parts = []\n    if authors:\n        parts.append(f'authors: {authors}')\n    if year:\n        parts.append(f'year: {year}')\n    if journal:\n        parts.append(f'journal: {journal}')\n    return '; '.join(parts)\n\n\ndef main(title=None, authors=None, year=None, journal=None, user_query=None):\n    title = _clean(title)\n    authors = _clean(authors)\n    year = _clean(year)\n    journal = _clean(journal)\n    user_query = _clean(user_query)\n\n    sections = _section_tokens()\n    meta = _meta_suffix(authors, year, journal)\n\n    if _is_summary_intent(user_query):\n        if title:\n            query = f'{title} {sections}'\n        elif authors:\n            query = f'{authors} {sections}'\n        else:\n            query = sections\n    else:\n        question = user_query or 'What are the key contributions of this paper?'\n        if title:\n            query = f'{title} {question} {sections}'\n        elif authors:\n            query = f'{authors} {question} {sections}'\n        else:\n            query = f'{question} {sections}'\n\n    if meta:\n        query = f'{query} {meta}'\n\n    return {'semantic_query': query.strip()}\n"
