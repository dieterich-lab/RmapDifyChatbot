    - data:
        code: "import json\nimport os\nfrom urllib.error import HTTPError, URLError\nfrom urllib.parse import urlencode\nfrom urllib.request import Request, urlopen\n\n\ndef _is_summary_intent(query):\n    q = (query or '').lower()\n    markers = [\n        'summarize', 'summary', 'zusammenfassung', 'fasse', 'fassen',\n        'overview', 'explain briefly', 'kurz', 'short summary'\n    ]\n    return any(m in q for m in markers)\n\n\ndef _norm(text):\n    return str(text or '').strip()\n\n\ndef _run_json_get(url, headers, timeout=30):\n    req = Request(url=url, headers=headers, method='GET')\n    try:\n        with urlopen(req, timeout=timeout) as resp:\n            body = resp.read().decode('utf-8', errors='replace')\n            status = resp.getcode()\n    except HTTPError as exc:\n        body = exc.read().decode('utf-8', errors='replace')\n        return {}, f'HTTPError {exc.code}: {body}'\n    except URLError as exc:\n        return {}, f'URLError: {exc}'\n    except Exception as exc:\n        return {}, f'Error: {exc}'\n\n    if status != 200:\n        return {}, f'HTTP {status}: {body}'\n\n    try:\n        return json.loads(body), None\n    except Exception:\n        return {}, f'Invalid JSON: {body[:500]}'\n\n\ndef _extract_doc_id_from_result(result):\n    if not isinstance(result, list):\n        return ''\n    counts = {}\n    order = []\n    for item in result:\n        md = (item or {}).get('metadata') or {}\n        doc_id = _norm(md.get('document_id'))\n        if not doc_id:\n            continue\n        if doc_id not in counts:\n            order.append(doc_id)\n        counts[doc_id] = counts.get(doc_id, 0) + 1\n    if not order:\n        return ''\n    return max(order, key=lambda d: counts[d])\n\n\ndef _extract_items(payload):\n    if isinstance(payload, dict):\n        if isinstance(payload.get('data'), list):\n            return payload.get('data')\n        if isinstance(payload.get('segments'), list):\n            return payload.get('segments')\n    return []\n\n\ndef _segment_content(seg):\n    if not isinstance(seg, dict):\n        return ''\n    for key in ('content', 'text', 'segment', 'segment_text'):\n        value = seg.get(key)\n        if isinstance(value, str) and value.strip():\n            return value\n        if isinstance(value, dict):\n            nested = value.get('content') or value.get('text')\n            if isinstance(nested, str) and nested.strip():\n                return nested\n    return ''\n\n\ndef _segment_position(seg):\n    if not isinstance(seg, dict):\n        return 10**9\n    for key in ('position', 'segment_position', 'index', 'order'):\n        val = seg.get(key)\n        if isinstance(val, (int, float)):\n            return int(val)\n    return 10**9\n\n\ndef _fetch_all_segments(api_base, dataset_id, document_id, headers):\n    all_segments = []\n    seen = set()\n\n    for page in range(1, 31):\n        q = urlencode({'page': page, 'limit': 100})\n        url = f'{api_base}/datasets/{dataset_id}/documents/{document_id}/segments?{q}'\n        payload, err = _run_json_get(url, headers=headers, timeout=30)\n        if err:\n            if page == 1:\n                return [], err\n            break\n\n        items = _extract_items(payload)\n        if not items:\n            break\n\n        for seg in items:\n            content = _segment_content(seg)\n            if not content:\n                continue\n            sid = _norm((seg or {}).get('id'))\n            key = sid or content[:200]\n            if key in seen:\n                continue\n            seen.add(key)\n            all_segments.append({'position': _segment_position(seg), 'content': content})\n\n        if len(items) < 100:\n            break\n\n    all_segments.sort(key=lambda x: x['position'])\n    joined = '\\n\\n'.join(s['content'] for s in all_segments if s['content'])\n    return joined, None\n\n\ndef main(selected_result=None, selection_reason=None, user_query=None):\n    if not _is_summary_intent(user_query or ''):\n        return {\n            'whole_paper_text': '',\n            'use_whole_paper': False,\n            'whole_paper_doc_id': '',\n            'whole_paper_error': 'non-summary-intent'\n        }\n\n    doc_id = _extract_doc_id_from_result(selected_result)\n    if not doc_id:\n        return {\n            'whole_paper_text': '',\n            'use_whole_paper': False,\n            'whole_paper_doc_id': '',\n            'whole_paper_error': 'no-document-id'\n        }\n\n    api_base = (_norm(os.getenv('DIFY_API_URL')) or 'http://rmap-chatbot-demo-dify/v1').rstrip('/')\n    dataset_id = _norm(os.getenv('DIFY_DATASET_ID')) or '<your-dataset-id>'\n    api_key = _norm(os.getenv('DIFY_API_KEY')) or 'REDACTED'\n\n    if not api_base or not dataset_id or not api_key:\n        return {\n            'whole_paper_text': '',\n            'use_whole_paper': False,\n            'whole_paper_doc_id': doc_id,\n            'whole_paper_error': 'missing-api-config'\n        }\n\n    headers = {'Authorization': f'Bearer {api_key}', 'Content-Type': 'application/json'}\n    text, err = _fetch_all_segments(api_base, dataset_id, doc_id, headers)\n    if err:\n        return {\n            'whole_paper_text': '',\n            'use_whole_paper': False,\n            'whole_paper_doc_id': doc_id,\n            'whole_paper_error': err\n        }\n\n    if not text:\n        return {\n            'whole_paper_text': '',\n            'use_whole_paper': False,\n            'whole_paper_doc_id': doc_id,\n            'whole_paper_error': 'no-segments'\n        }\n\n    max_chars = 24000\n    clipped = text[:max_chars]\n    return {\n        'whole_paper_text': clipped,\n        'use_whole_paper': True,\n        'whole_paper_doc_id': doc_id,\n        'whole_paper_error': ''\n    }\n"
