            quotable sentence about the query topic exists in the context, write EXACTLY:
            "No verbatim quote available." NEVER fabricate, paraphrase, or invent
            a quote.

            6. Only include papers whose chunks contain information relevant to the
            user''s query. Skip papers with no relevant content.


            Format (use EXACTLY this format):

            **"Paper Title"** (Journal, Year)

