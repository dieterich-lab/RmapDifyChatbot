    - data:
        code: "import json\nimport re\n\nNL = chr(10)  # newline - avoids YAML escaping\
          \ issues\n\n\ndef _extract_text(chunk):\n    if isinstance(chunk, dict):\n\
          \        seg = chunk.get(\"segment\", {})\n        if isinstance(seg, dict)\
          \ and seg.get(\"content\", \"\").strip():\n            return str(seg[\"\
          content\"]).strip()\n        if chunk.get(\"content\", \"\").strip():\n\
          \            return str(chunk[\"content\"]).strip()\n        ccs = chunk.get(\"\
          child_chunks\", [])\n        if ccs:\n            parts = [\n          \
          \      str(c.get(\"content\", \"\")).strip() for c in ccs if isinstance(c,\
          \ dict)\n            ]\n            return NL.join(p for p in parts if p)\n\
          \        return \"\"\n    text = str(chunk or \"\").strip()\n    if text.startswith(\"\
          {\") or text.startswith(\"[\"):\n        try:\n            obj = json.loads(text)\n\
          \            if isinstance(obj, dict):\n                return _extract_text(obj)\n\
          \            if isinstance(obj, list):\n                parts = [_extract_text(i)\
          \ for i in obj[:3]]\n                return NL.join(p for p in parts if\
          \ p)\n        except Exception:\n            pass\n    return text\n\n\n\
          def _is_reference_chunk(text):\n    t = str(text or \"\").strip()\n    if\
          \ not t or len(t) < 20:\n        return False\n\n    doi_count = len(re.findall(r\"\
          doi\\.org/\\S+|DOI:\\s*\\S+\", t, re.IGNORECASE))\n    numbered_refs = len(\n\
          \        re.findall(r\"(?:^|\" + NL + r\")\\s*(?:\\d+\\.[ \\t]|\\[\\d+\\\
          ][ \\t]|\\(\\d+\\)\\s)\", t)\n    )\n    # also catch parenthetical refs\
          \ anywhere (e.g. \"...e99777. (83) de Crecy...\")\n    paren_refs_anywhere\
          \ = len(re.findall(r\"\\(\\d+\\)\\s\", t))\n    etal_count = len(re.findall(r\"\
          \\bet\\s+al\\b\", t, re.IGNORECASE))\n    year_parens = len(re.findall(r\"\
          \\((?:19|20)\\d{2}[a-z]?\\)\", t))\n\n    score = (\n        doi_count *\
          \ 3.0\n        + numbered_refs * 1.5\n        + paren_refs_anywhere * 1.0\n\
          \        + etal_count * 0.5\n        + year_parens * 0.3\n    )\n    density\
          \ = score / max(1.0, len(t) / 500.0)\n\n    if doi_count >= 4:\n       \
          \ return True\n    if numbered_refs >= 8:\n        return True\n    if density\
          \ > 1.8:\n        return True\n\n    first_line = t.split(NL)[0].strip()\n\
          \    if re.match(r\"^\\d+[\\.,]\\s\", first_line) or re.match(r\"^\\[\\\
          d+\\]\", first_line):\n        if density > 0.8:\n            return True\n\
          \n    return False\n\n\ndef _metadata_looks_garbled(title, authors, year,\
          \ journal):\n    \"\"\"Detect clearly broken metadata (book chapters, extraction\
          \ failures).\"\"\"\n    t = str(title or \"\").strip()\n    a = str(authors\
          \ or \"\").strip()\n    y = str(year or \"\").strip()\n    j = str(journal\
          \ or \"\").strip()\n\n    # Title has no spaces → garbled concatenation\
          \ (e.g. \"ComputationalEpigenomicsandEpitranscriptomics\")\n    if len(t)\
          \ > 15 and \" \" not in t:\n        return True\n\n    # Authors contain\
          \ structural text, not person names\n    a_lower = a.lower()\n    garbled_author_markers\
          \ = [\n        \"editor\",\n        \"series\",\n        \"ethods in\",\n\
          \        \"olecular biology\",\n    ]\n    if any(m in a_lower for m in\
          \ garbled_author_markers):\n        return True\n\n    # Year is not a 4-digit\
          \ year\n    if y and not re.fullmatch(r\"(19|20)\\d{2}\", y):\n        return\
          \ True\n\n    # Journal is just numbers / page ranges (e.g. \"241-260\"\
          )\n    if j and re.fullmatch(r\"\\d+[\\-–]\\d+\", j):\n        return True\n\
          \n    return False\n\n\ndef _get_doc_info(chunk):\n    \"\"\"Extract rich\
          \ document info from a Dify KR result item using real metadata.\"\"\"\n\
          \    if not isinstance(chunk, dict):\n        return None\n    meta = chunk.get(\"\
          metadata\", {})\n    if not isinstance(meta, dict):\n        return None\n\
          \n    doc_meta = meta.get(\"doc_metadata\", {})\n    if isinstance(doc_meta,\
          \ dict):\n        title = str(doc_meta.get(\"title\", \"\")).strip()\n \
          \       authors = str(doc_meta.get(\"authors\", \"\")).strip()\n       \
          \ journal = str(doc_meta.get(\"journal\", \"\")).strip()\n        year =\
          \ str(doc_meta.get(\"year\", \"\")).strip()\n\n        # Detect garbled\
          \ metadata (common with book chapters)\n        if title and not _metadata_looks_garbled(title,\
          \ authors, year, journal):\n            header = f'\"{title}\"'\n      \
          \      if authors:\n                header += f\" by {authors}\"\n     \
          \       if journal or year:\n                header += \" (\"\n        \
          \        if journal:\n                    header += journal\n          \
          \      if year:\n                    if journal:\n                     \
          \   header += \", \"\n                    header += year\n             \
          \   header += \")\"\n            return header\n\n    # Fallback: use filename-based\
          \ title field, parse structured info\n    title = str(chunk.get(\"title\"\
          , \"\")).strip()\n    if title:\n        title = re.sub(r\"__[a-z_]+_\\\
          d{10,}(?:\\.pdf)?$\", \"\", title, flags=re.IGNORECASE)\n        title =\
          \ re.sub(r\"\\.pdf$\", \"\", title, flags=re.IGNORECASE)\n        title\
          \ = title.strip()\n        if title:\n            # Try to parse structured\
          \ filename: \"Authors, Year, Journal, ...\"\n            parts = [p.strip()\
          \ for p in title.split(\",\")]\n            if len(parts) >= 3:\n      \
          \          maybe_authors = parts[0]\n                maybe_year = parts[1].strip()\n\
          \                maybe_journal = parts[2].strip()\n                if re.fullmatch(r\"\
          (19|20)\\d{2}\", maybe_year):\n                    header = f'\"{title}\"\
          '\n                    if maybe_authors:\n                        header\
          \ += f\" by {maybe_authors}\"\n                    header += f\" ({maybe_journal},\
          \ {maybe_year})\"\n                    return header\n            return\
          \ title\n    return None\n\n\ndef main(kr_result=None):\n    if not isinstance(kr_result,\
          \ list):\n        return {\"filtered_chunks\": [], \"chunk_count\": 0, \"\
          chunks_removed\": 0}\n    kept = []\n    removed = 0\n    seen_docs = set()\n\
          \    for c in kr_result:\n        text = _extract_text(c)\n        if not\
          \ text or len(text) < 20:\n            continue\n        if _is_reference_chunk(text):\n\
          \            removed += 1\n        else:\n            doc_name = _get_doc_info(c)\n\
          \            if doc_name:\n                seen_docs.add(doc_name)\n   \
          \             text = \"From paper: \" + doc_name + NL + text\n         \
          \   kept.append(text)\n    # Safety: if too few chunks survived, pass all\
          \ through unfiltered\n    if len(kept) < 3 and len(kr_result) >= 3:\n  \
          \      kept = []\n        removed = 0\n        for c in kr_result:\n   \
          \         text = _extract_text(c)\n            if not text or len(text)\
          \ < 20:\n                continue\n            doc_name = _get_doc_info(c)\n\
          \            if doc_name:\n                seen_docs.add(doc_name)\n   \
          \             text = \"From paper: \" + doc_name + NL + text\n         \
          \   kept.append(text)\n\n    # Deduplicate by paper: merge chunks from same\
          \ document\n    by_doc = {}\n    for chunk in kept:\n        parts = chunk.split(NL,\
          \ 1)\n        doc_key = parts[0] if parts[0].startswith(\"From paper:\"\
          ) else \"_unknown\"\n        content = parts[1] if len(parts) > 1 else chunk\n\
          \        if doc_key not in by_doc:\n            by_doc[doc_key] = []\n \
          \       by_doc[doc_key].append(content)\n    deduped = []\n    for doc_key,\
          \ contents in by_doc.items():\n        merged = NL.join(contents[:1])  #\
          \ max 1 chunk per paper (recall-optimized)\n        deduped.append(doc_key\
          \ + NL + merged)\n\n    if not deduped:\n        deduped.append(\n     \
          \       \"ALL \"\n            + str(len(kr_result))\n            + \" RETRIEVED\
          \ CHUNKS WERE REFERENCE LISTS AND FILTERED OUT. The query may match bibliography\
          \ sections rather than paper body text. Try a more specific query or different\
          \ search terms.\"\n        )\n    return {\n        \"filtered_chunks\"\
          : deduped[:30],\n        \"chunk_count\": min(len(deduped), 30),\n     \
          \   \"chunks_removed\": removed,\n        \"doc_names\": sorted(seen_docs)[:30],\n\
          \    }\n"
