          \   errors = []\n    docs = []\n\n    all_items = []\n    for page in range(1,\
          \ 21):\n        q = urlencode({\"page\": page, \"limit\": 100})\n      \
          \  list_url = f\"{api_base}/datasets/{dataset_id}/documents?{q}\"\n    \
          \    payload, err = _run_json_get(list_url, headers=headers)\n        if\
          \ err:\n            if page == 1:\n                return [], [err]\n  \
          \          break\n\n        items = _extract_items(payload)\n        if\
          \ not items:\n            break\n        all_items.extend(items)\n     \
          \   if len(items) < 100:\n            break\n\n    for item in all_items:\n\
          \        doc_id = str((item or {}).get(\"id\") or \"\").strip()\n      \
          \  if not doc_id:\n            continue\n\n        detail_url = f\"{api_base}/datasets/{dataset_id}/documents/{doc_id}?{urlencode({'metadata':\
          \ 'all'})}\"\n        detail, detail_err = _run_json_get(detail_url, headers=headers)\n\
          \        if detail_err:\n            errors.append(f\"Dokument {doc_id}:\
          \ {detail_err}\")\n            continue\n\n        meta = _metadata_to_dict(detail)\n\
          \        docs.append(\n            {\n                \"id\": doc_id,\n\
          \                \"title\": meta.get(\"title\") or str(detail.get(\"name\"\
          ) or \"\").strip(),\n                \"authors\": meta.get(\"authors\",\
          \ \"\"),\n                \"year\": meta.get(\"year\", \"\"),\n        \
          \        \"journal\": meta.get(\"journal\", \"\"),\n            }\n    \
          \    )\n\n    return docs, errors\n\n\ndef _render_result(matches: list[dict],\
          \ total_docs: int) -> str:\n    if not matches:\n        return (\n    \
          \        \"Keine Dokumente gefunden.\\n\"\n            f\"Code-Version:\
          \ {CODE_VERSION}; Dokumente geprueft: {total_docs}; Treffer: 0\"\n     \
          \   )\n\n    lines = []\n    for idx, doc in enumerate(matches, start=1):\n\
          \        lines.append(\n            f\"{idx}. {doc['title']} | {doc['authors']}\
          \ | {doc['year']} | {doc['journal']} | {doc.get('id', '')}\"\n        )\n\
          \    header = (\n        f\"Code-Version: {CODE_VERSION}; Dokumente geprueft:\
          \ {total_docs}; \"\n        f\"Treffer: {len(matches)}\"\n    )\n    return\
          \ header + \"\\n\" + \"\\n\".join(lines)\n\n\ndef main(year=None, authors=None,\
          \ journal=None, title=None, paper_list=None):\n    api_base = (os.getenv(\"\
          DIFY_API_URL\") or \"http://rmap-chatbot-demo-dify/v1\").rstrip(\n     \
