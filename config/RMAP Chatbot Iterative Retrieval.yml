          : f\"Bearer {api_key}\", \"Content-Type\": \"application/json\"}\n\n   \
          \ resolved = _norm(doc_id)\n    used_title_fallback = False\n    if not\
          \ resolved:\n        title = _norm(item_title)\n        if not title:\n\
          \            return {\"paper_context\": \"\", \"paper_fetch_error\": \"\
          no doc_id and no title\"}\n        resolved, err = _find_doc_id_by_title(api_base,\
          \ dataset_id, title, headers)\n        if not resolved:\n            return\
          \ {\n                \"paper_context\": \"\",\n                \"paper_fetch_error\"\
          : err or \"title lookup failed\",\n            }\n        used_title_fallback\
          \ = True\n\n    text, err = _fetch_all_segments(api_base, dataset_id, resolved,\
          \ headers)\n\n    # Fallback: if doc_id fetch returned no segments, try\
          \ title lookup\n    if (not text or err) and not used_title_fallback:\n\
          \        title = _norm(item_title)\n        if title:\n            fallback_id,\
          \ fb_err = _find_doc_id_by_title(\n                api_base, dataset_id,\
          \ title, headers\n            )\n            if fallback_id and fallback_id\
          \ != resolved:\n                text2, err2 = _fetch_all_segments(\n   \
          \                 api_base, dataset_id, fallback_id, headers\n         \
          \       )\n                if text2:\n                    text, err = text2,\
          \ None\n\n    if err:\n        return {\"paper_context\": \"\", \"paper_fetch_error\"\
          : err}\n\n    title = _norm(item_title)\n    year = _norm(item_year)\n \
          \   journal = _norm(item_journal)\n    authors = _norm(item_authors)\n \
          \   meta_line = (\n        f\"{title} ({year}, {journal}) — {authors}\"\n\
          \        if (year or journal or authors)\n        else title\n    )\n  \
