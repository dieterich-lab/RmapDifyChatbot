          \    )\n\n    return docs, errors\n\n\ndef _render_result(matches: list[dict], total_docs: int) -> str:\n    if not matches:\n        return (\n            \"Keine Dokumente gefunden.\\n\"\n \
          \           f\"Code-Version: {CODE_VERSION}; Dokumente geprueft: {total_docs}; Treffer: 0\"\n        )\n\n    lines = []\n    for idx, doc in enumerate(matches, start=1):\n        lines.append(\n\
          \            f\"{idx}. {doc['title']} | {doc['authors']} | {doc['year']} | {doc['journal']} | {doc.get('id', '')}\"\n        )\n    header = (\n        f\"Code-Version: {CODE_VERSION}; Dokumente\
          \ geprueft: {total_docs}; \"\n        f\"Treffer: {len(matches)}\"\n    )\n    return header + \"\\n\" + \"\\n\".join(lines)\n\n\ndef main(paper_list=None):\n    api_base = (os.getenv(\"DIFY_API_URL\"\
          ) or \"http://rmap-chatbot-demo-dify/v1\").rstrip(\n        \"/\"\n    )\n    dataset_id = os.getenv(\"DIFY_DATASET_ID\") or \"5a231cec-21bf-40b9-86c8-87b9d01bca74\"\n    api_key = os.getenv(\"\
          DIFY_API_KEY\") or \"dataset-z3bHkQ6eUPKN21GaLq3KXIiS\"\n\n    if not _is_set(api_base) or not _is_set(dataset_id) or not _is_set(api_key):\n        return {\n            \"result\": (\n     \
          \           \"Dify API Konfiguration unvollstaendig. \"\n                \"Erwarte DIFY_API_URL, DIFY_DATASET_ID und DIFY_API_KEY.\"\n            )\n        }\n\n    items = paper_list if isinstance(paper_list,\
          \ list) else []\n    if not items:\n        return {\"result\": [], \"result_text\": \"\"}\n\n    headers = _build_headers(str(api_key).strip())\n    docs, errors = _collect_documents(str(api_base),\
          \ str(dataset_id).strip(), headers)\n\n    all_matches = []\n    for item in items:\n        if not isinstance(item, dict):\n            continue\n        year_filter = _sanitize_year_filter(item.get(\"\
