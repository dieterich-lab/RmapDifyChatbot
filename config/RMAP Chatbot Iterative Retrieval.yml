        prompt_template:
        - id: a9fe8803-7835-42ac-95b4-b46cd7ac5917
          role: system
          text: 'Extract a normalized paper list for downstream iterative retrieval.


            Return valid JSON only via structured output.


            Rules:


            - Output one object per requested paper or paper constraint.


            - Never invent paper titles, years, journals, or authors.


            - If the query asks for papers by author only (for example: "What papers
            did X author?"), output exactly one item with only authors set and keep
            title/year/journal empty.


            - Allowed fields per item: title, authors, year, journal.


            - Keep only explicit constraints from the rewritten query.


            - If user references prior turns (for example: "those papers"), resolve
            them from conversation context and emit explicit paper items.


            - If the rewritten query asks for a subset of previously listed papers
            (for example: "first two", "top 3", "newest one", "oldest one"),
            still emit explicit paper items for that subset.


            - If the rewritten query asks to compare or contrast previously listed
            papers, emit all referenced papers as explicit items.


            - For ranking intents, preserve year constraints when available so downstream
            retrieval can keep ordering cues.


            - If no metadata constraints are present, return an empty list.


            - Do not add explanations.


            - Never output <think> tags or reasoning text.'
          reasoning_format: separated
        selected: false
        structured_output:
          schema:
            additionalProperties: false
            properties:
