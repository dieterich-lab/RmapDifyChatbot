    - data:
        code: "import re\n\n\ndef _strip_think(text):\n    cleaned = str(text or \"\
          \")\n    # Remove well-formed think blocks first.\n    cleaned = re.sub(r\"\
          <think>.*?</think>\", \"\", cleaned, flags=re.S | re.I)\n    # Also handle\
          \ truncated outputs where </think> is missing.\n    cleaned = re.sub(r\"\
          <think>.*$\", \"\", cleaned, flags=re.S | re.I)\n    return cleaned.strip()\n\
          \n\ndef main(knowledge_text=None, metadata_text=None):\n    parts = []\n\
          \    first = _strip_think(knowledge_text)\n    second = _strip_think(metadata_text)\n\
          \    if first:\n        parts.append(first)\n    if second:\n        parts.append(second)\n\
          \    merged = \"\\n\\n\".join(parts).strip()\n    return {\"cleaned_text\"\
          : merged}\n"
