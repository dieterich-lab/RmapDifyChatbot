    - data:
        instruction: 'Extract only explicit metadata constraints from the user query.


          Required fields:
          - year: return publication year only if explicitly stated as a 4-digit
          year.
          - authors: return list of explicitly named authors.
          - journal: return journal only if explicitly stated.
          - title: return title only if explicitly stated or clearly quoted.


          Author extraction rules:
          - If query contains patterns like "by <name>", "authored by <name>",
            "co-authored by <name>", extract <name> into authors.
          - Example: "Which papers have been (co-) authored by Christoph Dieterich?"
            => authors=["Christoph Dieterich"]
          - Example: "How many papers has Christoph Dieterich published?"
            => authors=["Christoph Dieterich"]


          Strict constraints:
          - Do not infer or hallucinate missing values.
          - Preserve user-provided spelling.
          - For non-mentioned fields return empty values.'
