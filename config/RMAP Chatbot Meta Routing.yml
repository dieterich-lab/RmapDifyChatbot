        - id: '2'
          name: Metadata Route (count/list/filter by metadata)
        instruction: 'Choose exactly one category.


          Category 2 (Metadata Route) when the query asks for counts/lists/filters
          over metadata fields (author, co-author, year, journal, title).


          Always Category 2 for phrases like:
          - how many / number of papers
          - which papers / list papers / papers by
          - authored by / co-authored by


          Category 1 (Knowledge Route) only for content understanding:
          summary, methods, findings, comparison, interpretation.


          If uncertain, choose Category 2.


          Output format:
          - Return one JSON object only.
          - Include category_id ("1" or "2") and category_name.'
