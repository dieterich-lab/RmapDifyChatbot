    - data:
        code: |
          import json
          import os
          from urllib.error import HTTPError, URLError
          from urllib.parse import urlencode
          from urllib.request import Request, urlopen

          EMPTY = {"", "null", "none", "unknown", "n/a", "na", "[]", "{}", "-"}

          def norm(value):
              if value is None:
                  return ""
              text = str(value).strip()
              return "" if text.lower() in EMPTY else text

          def str_list(value):
              if value is None:
                  return []
              if isinstance(value, list):
                  return [norm(v) for v in value if norm(v)]
              if isinstance(value, str):
                  v = norm(value)
                  return [v] if v else []
              return []

          def author_match(author_filter, doc_authors_lower):
              raw = norm(author_filter).lower()
              if not raw:
                  return True

              if raw in doc_authors_lower:
                  return True

              tokens = [t for t in raw.replace(".", " ").replace(",", " ").split() if t]
              if not tokens:
                  return True

              # Prefer family-name hit when full name is given.
              last_name = tokens[-1]
              if len(last_name) >= 3 and last_name in doc_authors_lower:
                  return True

              # Fallback: require all meaningful tokens to appear somewhere.
              strong_tokens = [t for t in tokens if len(t) >= 3]
              if strong_tokens and all(t in doc_authors_lower for t in strong_tokens):
                  return True

              return False

          def safe_json_get(url, headers):
              req = Request(url=url, headers=headers, method="GET")
              try:
                  with urlopen(req, timeout=30) as r:
                      if r.getcode() != 200:
                          return {}, f"HTTP {r.getcode()}"
                      return json.loads(r.read().decode("utf-8", errors="replace")), None
              except HTTPError as e:
                  return {}, f"HTTP {e.code}"
              except URLError as e:
                  return {}, f"Network error: {e}"
              except Exception as e:
                  return {}, f"Unexpected error: {e}"

          def extract_docs(payload):
              if isinstance(payload, dict):
                  if isinstance(payload.get("data"), list):
                      return payload.get("data", [])
                  if isinstance(payload.get("documents"), list):
                      return payload.get("documents", [])
              return []

          def meta_dict(detail):
              out = {}
              for item in (detail.get("doc_metadata") or []):
                  name = norm((item or {}).get("name")).lower()
                  value = norm((item or {}).get("value"))
                  if name:
                      out[name] = value
              return out

          def main(year=None, authors=None, journal=None, title=None):
              api_base = (os.getenv("DIFY_API_URL") or "http://rmap-chatbot-demo-dify/v1").rstrip("/")
              dataset_id = norm(os.getenv("DIFY_DATASET_ID") or "227cf97a-8e56-4cd6-808d-caf57bc0d2bf")
              api_key = norm(os.getenv("DIFY_API_KEY") or "dataset-z3bHkQ6eUPKN21GaLq3KXIiS")
              if not api_base or not dataset_id or not api_key:
                  return {"result": "Metadata API configuration is incomplete."}

              headers = {"Authorization": f"Bearer {api_key}", "Content-Type": "application/json"}
              year_filter = norm(year)
              journal_filter = norm(journal).lower()
              title_filter = norm(title).lower()
              author_filters = [a.lower() for a in str_list(authors)]

              docs_payload, err = safe_json_get(f"{api_base}/datasets/{dataset_id}/documents", headers)
              if err:
                  return {"result": f"Metadata lookup failed: {err}"}

              matches = []
              for item in extract_docs(docs_payload):
                  doc_id = norm((item or {}).get("id"))
                  if not doc_id:
                      continue
                  detail_url = f"{api_base}/datasets/{dataset_id}/documents/{doc_id}?{urlencode({'metadata':'all'})}"
                  detail, d_err = safe_json_get(detail_url, headers)
                  if d_err:
                      continue

                  meta = meta_dict(detail)
                  doc_title = norm(meta.get("title") or detail.get("name"))
                  doc_authors = norm(meta.get("authors"))
                  doc_year = norm(meta.get("year"))
                  doc_journal = norm(meta.get("journal"))

                  if year_filter and year_filter != doc_year:
                      continue
                  if journal_filter and journal_filter not in doc_journal.lower():
                      continue
                  if title_filter and title_filter not in doc_title.lower():
                      continue
                  if author_filters and not all(author_match(a, doc_authors.lower()) for a in author_filters):
                      continue

                  matches.append(
                      {
                          "title": doc_title,
                          "authors": doc_authors,
                          "year": doc_year,
                          "journal": doc_journal,
                      }
                  )

              if not matches:
                  return {"result": "No documents matched the requested metadata filters."}

              lines = [f"Found {len(matches)} matching document(s)."]
              for i, doc in enumerate(matches[:10], start=1):
                  lines.append(
                      f"{i}. {doc['title']} | {doc['authors']} | {doc['year']} | {doc['journal']}"
                  )

              return {"result": "\n".join(lines)}
