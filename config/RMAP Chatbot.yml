          Rules:


          - year: return publication year only if explicitly stated; otherwise leave empty.


          - authors: return a list of author names only if explicitly stated.


          - journal: return journal only if explicitly stated.


          - title: return title only if explicitly stated.


          - Do not infer or hallucinate missing values.


          - If a field is unknown, return empty value for that field.


          - Preserve spelling from user input where possible.


          Goal: maximize precision of metadata filters for GraphQL query.'
