    - data:
        classes:
        - id: '1'
          name: Content based (search for terms, concepts and summaries)
        - id: '2'
          name: Meta data aggregation (search for authors, years, cardinalities)
        instruction: 'Classify the user question into one of two classes.


          CLASS 1 (Content/RAG): The user asks for explanations, summaries, mechanisms,
          interpretations, conclusions, or "what is known" style answers based on document
          content.


          CLASS 2 (Metadata/GraphQL): The user asks for counts, lists, filtering, or exact
          lookup by metadata fields such as author, year, journal, or title.


          Routing rule for hybrid questions:


          - If the question contains a clear metadata intent (how many, list, papers by X,
          in year Y, in journal Z), route to CLASS 2.


          - Only route to CLASS 1 when the user primarily asks for content understanding.


          Examples:


          - CLASS 1: "What can you tell me about the knockdown of METTL1?"


          - CLASS 2: "How many papers are (co-) authored by Mark Helm?"


          - CLASS 2: "List papers by C. Dieterich in 2021."


          - CLASS 2: "How many papers by C. Dieterich and what journals are they in?"'
